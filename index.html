<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jenella — Live Crypto Dashboard</title>
<!-- Include Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0a0a0a; --bg-2:#111315;
    --card:rgba(255,255,255,0.04); --card-border:rgba(255,255,255,0.08);
    --text:#f5f7f8; --muted:#8a9499;
    --teal:#14e0c2; --teal-2:#0fbfa6; --teal-soft:rgba(20,224,194,0.12);
    --danger:#ff5e6c; --success:#3ddc97;
    --shadow:0 20px 60px rgba(0,0,0,0.45);
  }
  .light{
    --bg:#f4f6f8; --bg-2:#e9eef2;
    --card:rgba(255,255,255,0.75); --card-border:rgba(0,0,0,0.08);
    --text:#0c1116; --muted:#566069;
    --teal-soft:rgba(15,191,166,0.15);
    --shadow:0 20px 60px rgba(15,30,40,0.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  body{
    background: radial-gradient(1000px 600px at 80% -10%, rgba(20,224,194,0.18), transparent 60%), var(--bg);
    transition:background .4s ease, color .4s ease;
  }
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 28px;border-bottom:1px solid var(--card-border);
    backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;
  }
  .brand{display:flex;align-items:center;gap:12px;font-weight:700;}
  .logo{
    width:38px;height:38px;border-radius:11px;
    background:linear-gradient(135deg,var(--teal),var(--teal-2));
    display:grid;place-items:center;color:#062421;font-weight:900;
  }
  .icon-btn{
    background:var(--card);border:1px solid var(--card-border);color:var(--text);
    padding:8px 12px;border-radius:10px;cursor:pointer;font-size:13px;text-decoration:none;
  }
  main{max-width:1100px;margin:0 auto;padding:32px 20px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media (max-width:820px){main{grid-template-columns:1fr;}}
  .card{
    background:var(--card);border:1px solid var(--card-border);border-radius:18px;
    padding:22px;backdrop-filter:blur(14px);box-shadow:var(--shadow);
  }
  .card.full{grid-column:1/-1}
  .row{display:flex;justify-content:space-between;align-items:center;margin:8px 0}
  .amount{font-size:34px;font-weight:800;}
  .badge.paid{background:rgba(61,220,151,0.15);color:var(--success);padding:4px 8px;border-radius:8px}
  .btn{
    width:100%; padding:12px; border-radius:12px; border:0; cursor:pointer;
    background:linear-gradient(135deg,var(--teal),var(--teal-2)); color:#062421; font-weight:700;
  }
  .btn.ghost{background:transparent; color:var(--text); border:1px solid var(--card-border)}
  input{
    width:100%;padding:12px;border-radius:12px;border:1px solid var(--card-border);
    background:rgba(0,0,0,0.2);color:#fff;margin-bottom:10px;
  }
  .log-item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid var(--card-border);font-size:13px}
  .tag{color:var(--teal);font-weight:bold}
  #toasts{position:fixed;bottom:20px;right:20px;z-index:99}
  .toast{background:#111;padding:12px 20px;border-radius:10px;border-left:4px solid var(--teal);margin-top:10px;box-shadow:0 10px 20px rgba(0,0,0,0.5)}
</style>
</head>
<body>
  <header>
    <div class="brand"><div class="logo">J</div><div>Jenella <small>LIVE</small></div></div>
    <div class="top-actions">
        <button class="icon-btn" onclick="toggleTheme()">🌙 Mode</button>
    </div>
  </header>

  <main>
    <!-- Card Balance -->
    <section class="card">
      <h2>Virtual Wallet</h2>
      <div class="row"><span>Card USD</span><span id="cardBal" class="amount">$0.00</span></div>
      <div class="row"><span>USDT (ERC20)</span><span id="usdtBal" class="amount">0.00</span></div>
      <button class="btn" style="margin-top:10px" onclick="topUp()">＋ Free Top Up ($500)</button>
    </section>

    <!-- Payment -->
    <section class="card">
      <h2>Active Invoice</h2>
      <div class="row"><span>ID:</span><span id="invId">#JEN-LOAD...</span></div>
      <div class="row"><span>Amount:</span><span>$250.00 USD</span></div>
      <button class="btn" id="payBtn" onclick="payInvoice()">⚡ Pay & Swap to USDT</button>
    </section>

    <!-- Send -->
    <section class="card full">
      <h2>Withdraw USDT</h2>
      <input id="toAddr" type="text" placeholder="Recipient 0x address" />
      <input id="sendAmt" type="number" placeholder="Amount USDT" />
      <button class="btn" onclick="sendUSDT()">💸 Send Now</button>
    </section>

    <!-- Activity -->
    <section class="card full">
      <h2>Activity Log (Live from DB)</h2>
      <div id="log">Loading logs...</div>
    </section>
  </main>

  <div id="toasts"></div>

<script>
  // CONFIGURATION
  const SUPABASE_URL = "https://lylsbstusxitipdaohom.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5bHNic3R1c3hpdGlwZGFvaG9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTA0ODQsImV4cCI6MjA5MzY2NjQ4NH0.2TWRoyRCtpwmozDgnUZopi3x9Ek403KrS51PHELqL4M";
  const supabase =  supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let USER_KEY = localStorage.getItem("jenella_user_key") || "u_" + Math.random().toString(36).substring(7);
  localStorage.setItem("jenella_user_key", USER_KEY);

  let state = { usd: 0, usdt: 0 };

  // INITIALIZE DATA
  async function init() {
    let { data, error } = await supabase.from('user_wallets').select('*').eq('user_key', USER_KEY).single();
    
    if (!data) {
        // Create new user if not exists
        await supabase.from('user_wallets').insert([{ user_key: USER_KEY, usd_balance: 1000, usdt_balance: 0 }]);
        state.usd = 1000; state.usdt = 0;
    } else {
        state.usd = data.usd_balance;
        state.usdt = data.usdt_balance;
    }
    updateUI();
    loadLogs();
  }

  function updateUI() {
    document.getElementById("cardBal").textContent = `$${parseFloat(state.usd).toFixed(2)}`;
    document.getElementById("usdtBal").textContent = `${parseFloat(state.usdt).toFixed(2)}`;
    document.getElementById("invId").textContent = "#JEN-" + USER_KEY.toUpperCase().slice(-5);
  }

  async function topUp() {
    state.usd += 500;
    await supabase.from('user_wallets').update({ usd_balance: state.usd }).eq('user_key', USER_KEY);
    await logEvent('TOPUP', 'Added $500.00 via Free Topup', 500, 'USD');
    toast("Topped up $500!");
    updateUI();
  }

  async function payInvoice() {
    if (state.usd < 250) return toast("Insufficient funds", "error");
    
    state.usd -= 250;
    state.usdt += 250; // 1:1 Swap logic
    
    await supabase.from('user_wallets').update({ usd_balance: state.usd, usdt_balance: state.usdt }).eq('user_key', USER_KEY);
    await logEvent('PAYMENT', 'Paid Invoice #JEN-250 & Swapped to USDT', 250, 'USDT');
    
    toast("Invoice Paid & Swapped!");
    updateUI();
  }

  async function sendUSDT() {
    const amt = parseFloat(document.getElementById("sendAmt").value);
    const addr = document.getElementById("toAddr").value;
    
    if (state.usdt < amt) return toast("Insufficient USDT", "error");
    if (addr.length < 10) return toast("Invalid Address", "error");

    state.usdt -= amt;
    await supabase.from('user_wallets').update({ usdt_balance: state.usdt }).eq('user_key', USER_KEY);
    await logEvent('TRANSFER', `Sent to ${addr.slice(0,6)}...`, amt, 'USDT');
    
    toast("Transfer Successful!");
    updateUI();
  }

  async function logEvent(type, desc, amt, cur) {
    await supabase.from('activity_logs').insert([{ 
        user_key: USER_KEY, type, description: desc, amount: amt, currency: cur 
    }]);
    loadLogs();
  }

  async function loadLogs() {
    const { data } = await supabase.from('activity_logs')
        .select('*')
        .eq('user_key', USER_KEY)
        .order('created_at', { ascending: false });

    const container = document.getElementById("log");
    container.innerHTML = data.map(l => `
        <div class="log-item">
            <div><b>${l.description}</b><br><small>${new Date(l.created_at).toLocaleString()}</small></div>
            <div class="tag">${l.amount} ${l.currency}</div>
        </div>
    `).join('');
  }

  function toast(msg) {
    const t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    document.getElementById("toasts").appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function toggleTheme() { document.body.classList.toggle("light"); }

  init();
</script>
</body>
</html>
